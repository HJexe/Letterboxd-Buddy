<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letterboxd Buddy | Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bg-dynamic { background-color: var(--dynamic-bg, #1a221f); }
        }
    </style>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-dynamic text-white min-h-screen transition-colors duration-700 font-display flex justify-center p-8">

    <div class="w-full max-w-[420px] pb-24 animate-in">
        <!-- Header Section -->
        <header class="flex justify-between items-end mb-8 relative">
            <div>
                <a href="/index.html" class="inline-flex items-center text-white/50 hover:text-white transition-all text-[9.5px] font-black uppercase tracking-widest group mb-3">
                    <i data-lucide="chevron-left" class="w-3 h-3 mr-1 group-hover:-translate-x-1 transition-transform"></i>
                    Change User
                </a>
                <p id="gallery-subtitle" class="text-[9.5px] uppercase tracking-widest text-white/80 font-bold mb-1 flex items-center gap-2">
                    <img src="" id="user-avatar" class="w-4 h-4 rounded-full bg-white/10 hidden" alt="">
                    <span id="gallery-subtitle-text">HROOSHI'S</span>
                </p>
                <h1 id="gallery-title" class="text-[34px] font-bold tracking-tight text-white/95 leading-none">April 2026</h1>
            </div>
            
            <div class="flex items-center gap-1.5 pb-2">
                <div class="w-[7px] h-[7px] rounded-full bg-[#ff8000]"></div>
                <div class="w-[7px] h-[7px] rounded-full bg-[#00e054]"></div>
                <div class="w-[7px] h-[7px] rounded-full bg-[#00b1f1]"></div>
                <span class="text-[10px] font-bold tracking-[0.05em] text-white/70 ml-1.5 capitalize hidden sm:inline">Letterboxd</span>
            </div>
        </header>

        <!-- Grid Container -->
        <main id="grid-container" class="grid grid-cols-3 gap-2.5">
            <!-- Dynamic Cards Loaded from JS -->
        </main>
        
        <p class="text-center text-[9px] font-bold tracking-[0.1em] text-white/20 mt-14">Made with instaboxd.com</p>
    </div>

    <!-- Bottom Floating Color Picker -->
    <div class="fixed bottom-0 inset-x-0 p-6 flex justify-end items-center pointer-events-none z-50">
        <div id="gallery-colors" class="flex gap-2.5 pointer-events-auto items-center">
            <!-- Dynamically populated in JS -->
        </div>
    </div>

    <script type="module" src="/js/gallery.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
