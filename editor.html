<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letterboxd Buddy | Editor</title>
    <!-- Fonts for precise Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .text-accent { color: var(--accent-color, #00e054) !important; }
        .border-accent { border-color: var(--accent-color, #00e054) !important; }
        .bg-accent { background-color: var(--accent-color, #00e054) !important; }
        .bg-bg { background-color: var(--bg-color, #302018) !important; }
        
        .font-serif { font-family: 'Playfair Display', serif !important; }
        .font-sans { font-family: 'Inter', sans-serif !important; }
        
        /* Custom Scrollbar for sleekness */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#050505] text-white flex flex-col md:flex-row h-screen font-sans overflow-hidden">

    <!-- 1. MAIN CANVAS AREA -->
    <main class="flex-1 flex flex-col items-center justify-center p-6 relative overflow-hidden hidden md:flex">
        <!-- Render Target -->
        <div id="export-box" class="w-full max-w-[360px] aspect-[9/16] bg-bg rounded-[2rem] overflow-hidden shadow-[0_20px_60px_-10px_rgba(0,0,0,0.8)] relative transition-all duration-500 will-change-transform" style="--accent-color: #00e054; --bg-color: #302018;">
            
            <!-- TPL 01: FULL BLEED -->
            <div id="tpl-01" class="tpl-layer absolute inset-0 flex flex-col bg-bg hidden z-10 w-full h-full">
                <div class="absolute inset-0">
                    <img src="" class="cv-poster w-full h-full object-cover opacity-100" crossorigin="anonymous">
                    <div class="absolute inset-x-0 bottom-0 top-1/3 bg-gradient-to-t from-[#050505] via-[#050505]/70 to-transparent"></div>
                    <div class="absolute inset-x-0 top-0 h-32 bg-gradient-to-b from-[#050505]/80 to-transparent"></div>
                </div>
         
                <div class="relative z-20 px-6 pt-8 flex justify-center">
                    <div class="border border-white/10 bg-black/20 backdrop-blur-xl rounded-full px-5 py-2 text-[8px] font-black tracking-[0.2em] uppercase text-white/70 shadow-lg">
                        LETTERBOXD • @<span class="cv-user"></span>
                    </div>
                </div>
         
                <div class="relative z-20 flex-1 flex flex-col justify-end p-8 gap-4 pb-12">
                    <h2 class="cv-title text-[36px] font-black leading-none text-white xl text-shadow-sm line-clamp-2 pb-1"></h2>
                    <div class="cv-rev-container border border-white/10 bg-black/40 backdrop-blur-xl rounded-2xl p-6 shadow-2xl">
                        <p class="text-accent text-2xl leading-none font-serif font-black drop-shadow-md">"</p>
                        <p class="cv-review-text text-[13px] font-medium text-white/95 mt-1 mb-5 leading-relaxed italic line-clamp-3"></p>
                        <div class="cv-rating text-accent text-[11px] tracking-widest drop-shadow-md"></div>
                    </div>
                </div>
             </div>

            <!-- TPL 02: TITLE GRADIENT -->
            <div id="tpl-02" class="tpl-layer absolute inset-0 flex flex-col z-10 bg-bg hidden w-full h-full">
                <div class="h-[65%] relative">
                    <img src="" class="cv-poster absolute inset-0 w-full h-full object-cover opacity-100" crossorigin="anonymous">
                    <div class="absolute inset-x-0 bottom-0 h-64 bg-gradient-to-t from-[#050505] via-[#050505]/60 to-transparent"></div>
                    <div class="absolute inset-x-0 top-0 h-24 bg-gradient-to-b from-[#050505]/60 to-transparent"></div>
                </div>
                
                <div class="absolute top-8 left-0 right-0 flex justify-center z-20">
                    <span class="text-[8px] font-black tracking-[0.2em] text-white/50 uppercase">LETTERBOXD • @<span class="cv-user"></span></span>
                </div>
                
                <div class="absolute bottom-0 inset-x-0 h-[45%] flex flex-col justify-end px-8 pb-12 bg-[#050505]">
                    <span class="cv-year text-accent text-[10px] font-black tracking-[0.3em] mb-1 drop-shadow-md"></span>
                    <h2 class="cv-title text-[46px] font-black text-accent leading-[0.9] tracking-tighter uppercase pb-1 line-clamp-2"></h2>
                    <div class="cv-rating text-accent mt-6 text-sm tracking-widest drop-shadow-md"></div>
                </div>
            </div>

            <!-- TPL 03: SPLIT CARD -->
            <div id="tpl-03" class="tpl-layer absolute inset-0 flex flex-col hidden z-10 bg-[#0a0a0c] w-full h-full">
                <div class="h-[55%] relative">
                    <img src="" class="cv-poster absolute inset-0 w-full h-full object-cover" crossorigin="anonymous">
                    <div class="absolute inset-x-0 bottom-0 h-32 bg-gradient-to-t from-[#0a0a0c] via-[#0a0a0c]/80 to-transparent"></div>
                    <div class="absolute inset-x-0 top-0 h-24 bg-gradient-to-b from-black/60 to-transparent"></div>
                    <h2 class="cv-title absolute bottom-6 w-full text-center text-[26px] font-black tracking-[0.1em] uppercase text-accent drop-shadow-2xl px-6 line-clamp-1"></h2>
                </div>
                <div class="h-[45%] flex flex-col px-8 pb-10 pt-4">
                    <div class="flex items-center gap-3 text-[8px] font-black tracking-[0.2em] text-[#666] mb-4 uppercase">
                        <span class="cv-year border border-[#444] px-3 py-1 rounded-full text-accent shadow-[0_0_10px_var(--accent-color)_inset]"></span>
                        <span class="cv-genres text-white/30 truncate">ACTION • DRAMA</span>
                    </div>
                    <h2 class="cv-title text-3xl font-black text-white leading-none mb-3 tracking-tight line-clamp-1"></h2>
                    <p class="cv-review-text text-[13px] italic text-[#ccc] line-clamp-3 font-serif leading-relaxed mb-auto"></p>
                    
                    <div class="flex justify-between items-end mt-4">
                        <div class="cv-rev-container">
                            <div class="cv-rating px-4 py-1.5 rounded-full border border-accent/30 text-accent text-[10px] tracking-widest flex items-center shadow-[0_0_15px_var(--accent-color)_inset] bg-black/40"></div>
                        </div>
                        <span class="text-[9px] font-black tracking-[0.2em] text-white/30 uppercase">@<span class="cv-user"></span></span>
                    </div>
                </div>
            </div>

            <!-- TPL 04: MINIMAL CENTERED (Active by default based on mockup) -->
            <div id="tpl-04" class="tpl-layer absolute inset-0 flex flex-col bg-bg z-10 w-full h-full">
                <div class="px-8 pt-10 flex justify-between items-center text-[8px] font-black tracking-[0.2em] uppercase">
                    <div class="flex items-center gap-2">
                        <div class="flex gap-[3.5px]">
                            <div class="w-[7px] h-[7px] rounded-full bg-[#00b1f1]"></div>
                            <div class="w-[7px] h-[7px] rounded-full bg-[#ff8000]"></div>
                            <div class="w-[7px] h-[7px] rounded-full bg-[#00e054]"></div>
                        </div>
                        <span class="text-white ml-0.5 tracking-[0.25em]" style="text-shadow: 0 2px 4px rgba(0,0,0,0.5);">LETTERBOXD</span>
                    </div>
                    <span class="text-white" style="text-shadow: 0 2px 4px rgba(0,0,0,0.5);">@<span class="cv-user"></span></span>
                </div>
        
                <div class="flex-1 flex flex-col items-center justify-center pt-8">
                    <img src="" class="cv-poster w-[55%] aspect-[2/3] object-cover rounded-xl shadow-[0_30px_60px_rgba(0,0,0,0.7)] border border-white/5 mb-6" crossorigin="anonymous">
                    <h2 class="cv-title text-center text-[30px] font-black text-white leading-[1.1] tracking-tight drop-shadow-md px-4 line-clamp-1"></h2>
                    <div class="flex items-center gap-3 mt-3">
                        <div class="h-px w-5 bg-white/10"></div>
                        <span class="cv-year text-[9px] font-black tracking-[0.2em] text-white/40"></span>
                        <div class="h-px w-5 bg-white/10"></div>
                    </div>
                    <div class="cv-rating text-[#111] flex justify-center mt-5 text-sm tracking-[0.1em] drop-shadow-md" style="-webkit-text-stroke: 1px var(--accent-color); color: var(--accent-color);"></div>
                </div>
        
                <div class="px-8 pb-10 w-full pt-4">
                    <div class="cv-rev-container w-full border border-white/10 rounded-[1.25rem] p-6 bg-gradient-to-b from-white/[0.03] to-transparent shadow-xl min-h-[90px] flex items-center justify-center">
                        <p class="cv-review-text text-center italic font-serif text-[14px] font-medium text-white/95 leading-[1.6] line-clamp-3"></p>
                    </div>
                </div>
            </div>

        </div>

        <p class="mt-10 text-[9px] font-black text-white/20 uppercase tracking-[0.3em]">Tap items on canvas to customize</p>
    </main>

    <!-- 2. RIGHT SIDEBAR CONTROLS -->
    <aside class="w-full md:w-[420px] bg-[#0c0c0e] border-l border-white/5 flex flex-col h-full overflow-hidden shadow-2xl z-50 relative">
        
        <!-- Scrolling Film Strip (Top) -->
        <div class="border-b border-white/5 bg-[#050505]/50">
            <div id="film-strip" class="flex gap-3 overflow-x-auto p-5 scrollbar-hide snap-x">
                <!-- Injected via JS -->
            </div>
            <!-- Progress bar / visual accent -->
            <div class="h-[2px] w-full bg-white/5">
                <div class="h-full w-1/3 bg-white/20 rounded-full ml-4"></div>
            </div>
        </div>

        <div class="flex-1 overflow-auto p-8 space-y-10 scrollbar-hide relative pb-32">
            
            <!-- Atmospheric Color -->
            <section>
                <h3 class="text-[8.5px] uppercase tracking-[0.25em] font-black text-white/40 mb-4 flex items-center gap-2">
                    <i data-lucide="palette" class="w-3.5 h-3.5"></i> Atmospheric Color
                </h3>
                <div id="bg-list" class="flex flex-wrap gap-3">
                    <!-- Dynamic -->
                </div>
            </section>

            <!-- Template -->
            <section>
                <h3 class="text-[8.5px] uppercase tracking-[0.25em] font-black text-white/40 mb-4 flex items-center gap-2">
                    <i data-lucide="layout-template" class="w-3.5 h-3.5"></i> Template
                </h3>
                <div class="grid grid-cols-2 gap-3">
                    <button class="tpl-btn p-4 rounded-xl border border-white/5 bg-white/[0.02] text-[9.5px] font-black uppercase text-white/50 tracking-[0.1em] hover:bg-white/5 hover:text-white/80 transition-all" data-tpl="tpl-01">Full Bleed</button>
                    <button class="tpl-btn p-4 rounded-xl border border-white/5 bg-white/[0.02] text-[9.5px] font-black uppercase text-white/50 tracking-[0.1em] hover:bg-white/5 hover:text-white/80 transition-all" data-tpl="tpl-02">Title Gradient</button>
                    <button class="tpl-btn p-4 rounded-xl border border-white/5 bg-white/[0.02] text-[9.5px] font-black uppercase text-white/50 tracking-[0.1em] hover:bg-white/5 hover:text-white/80 transition-all hidden" data-tpl="tpl-03">Split Card</button>
                    <button class="tpl-btn p-4 rounded-xl border-accent bg-accent/5 text-[9.5px] font-black uppercase text-accent tracking-[0.1em] transition-all shadow-[0_0_15px_rgba(0,224,84,0.1)_inset]" data-tpl="tpl-04">Minimal Centered</button>
                    <button class="tpl-btn p-4 rounded-xl border border-white/5 bg-white/[0.02] text-[9.5px] font-black uppercase text-white/50 tracking-[0.1em] hover:bg-white/5 hover:text-white/80 transition-all" data-tpl="tpl-03">Monthly</button>
                </div>
            </section>

            <!-- Dynamic Accent -->
            <section>
                <h3 class="text-[8.5px] uppercase tracking-[0.25em] font-black text-white/40 mb-4 flex items-center gap-2">
                    <i data-lucide="droplets" class="w-3.5 h-3.5"></i> Dynamic Accent
                </h3>
                <div class="flex flex-wrap gap-3" id="accent-list">
                    <!-- Dynamic -->
                </div>
            </section>

            <!-- Dimensions -->
            <section>
                <h3 class="text-[8.5px] uppercase tracking-[0.25em] font-black text-white/40 mb-4 flex items-center gap-2">
                    <i data-lucide="smartphone" class="w-3.5 h-3.5"></i> Dimensions
                </h3>
                <div class="grid grid-cols-3 gap-3">
                    <button class="dim-btn active p-3 rounded-xl border border-white/10 bg-white/5 text-[9px] font-black text-white/80 tracking-widest hover:bg-white/10 transition-all outline outline-0 outline-offset-2 outline-white/20" data-dim="9/16">9:16</button>
                    <button class="dim-btn p-3 rounded-xl border border-white/5 bg-black/20 text-[9px] font-black text-white/40 tracking-widest hover:bg-white/5 transition-all" data-dim="4/5">4:5</button>
                    <button class="dim-btn p-3 rounded-xl border border-white/5 bg-black/20 text-[9px] font-black text-white/40 tracking-widest hover:bg-white/5 transition-all" data-dim="1/1">1:1</button>
                </div>
            </section>

            <!-- Content Elements -->
            <section>
                <h3 class="text-[8.5px] uppercase tracking-[0.25em] font-black text-white/40 mb-4 flex items-center gap-2">
                    <i data-lucide="layers" class="w-3.5 h-3.5"></i> Content Elements
                </h3>
                <div class="bg-white/[0.02] border border-white/5 rounded-2xl p-2 flex flex-col gap-2">
                    <div class="grid grid-cols-2 gap-2">
                        <button class="flex items-center justify-center gap-2 p-3 rounded-xl border border-white/5 bg-black/30 text-[9.5px] font-bold text-white/70 hover:text-white transition-colors" onclick="window.location.href='/index.html'">
                            <i data-lucide="users" class="w-3.5 h-3.5"></i> Change User
                        </button>
                        <button id="btn-custom-poster" class="flex items-center justify-center gap-2 p-3 rounded-xl border border-white/5 bg-black/30 text-[9.5px] font-bold text-white/70 hover:text-white transition-colors">
                            <i data-lucide="image" class="w-3.5 h-3.5"></i> Custom Poster
                        </button>
                        <input type="file" id="poster-upload" accept="image/png, image/jpeg, image/webp" class="hidden">
                    </div>
                    <div class="flex items-center justify-between px-4 py-3 bg-black/20 rounded-xl cursor-pointer hover:bg-white/5 transition-colors" id="toggle-review">
                        <span class="text-[10.5px] font-black text-white/80 tracking-wide">Show Review</span>
                        <div class="w-6 h-6 rounded-md bg-accent/20 flex items-center justify-center border border-accent/30 text-accent transition-colors" id="eye-icon-box">
                            <i data-lucide="eye" class="w-3.5 h-3.5"></i>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Export Footer -->
        <div class="absolute bottom-0 inset-x-0 p-6 bg-gradient-to-t from-[#0c0c0e] via-[#0c0c0e] to-transparent pt-12">
            <button id="btn-download" class="w-full py-4 bg-accent text-black font-black uppercase tracking-[0.3em] text-[10px] rounded-2xl hover:scale-[1.02] active:scale-[0.98] transition-transform shadow-[0_0_20px_var(--accent-color)_inset] flex justify-center items-center gap-2">
                <i data-lucide="download" class="w-4 h-4"></i> Export Render
            </button>
        </div>
    </aside>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <script type="module" src="/js/editor.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
